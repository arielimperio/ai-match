<div class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">

  <div
    class="p-10 w-full max-w-[420px] relative z-10 animate-in fade-in zoom-in-95 duration-700 bg-transparent border border-white/10 rounded-[32px]">

    <!-- Brand -->
    <div class="text-center mb-10 group">
      <div class="relative inline-block mb-6">
        <!-- Logo Glow Backdrop -->
        <div
          class="absolute -inset-6 bg-indigo-500/10 blur-3xl rounded-full opacity-0 group-hover:opacity-100 transition-opacity duration-1000">
        </div>
        <div class="absolute -inset-3 bg-white/5 backdrop-blur-md rounded-2xl border border-white/5 opacity-40"></div>

        <img src="assets/mint-logo.png" alt="Matchmaking Insight Engine Logo"
          class="relative h-12 w-auto mx-auto object-contain logo-img transition-all duration-700 hover:scale-110 logo-glow-active">
      </div>

      <div class="space-y-1">
        <h1
          class="text-white text-[32px] font-black uppercase tracking-tight mb-2 bg-gradient-to-br from-white via-indigo-100 to-white/60 bg-clip-text text-transparent">
          Insight Engine
        </h1>
        <div class="h-1 w-12 bg-indigo-500/30 mx-auto rounded-full mt-3"></div>
      </div>
    </div>

    <div class="space-y-6">

      <!-- Email -->
      <div class="space-y-2">
        <label class="block text-white/60 text-sm font-bold ml-1">Email</label>
        <div class="relative group">
          <span
            class="material-icons absolute left-4 top-1/2 -translate-y-1/2 text-white/30 group-focus-within:text-blue-400 transition-colors pointer-events-none z-10">mail_outline</span>
          <input type="text" [(ngModel)]="username" name="username"
            class="auth-input w-full h-14 pl-12 pr-4 rounded-2xl border border-white/5 bg-white/5 text-white text-[15px] transition-all outline-none focus:border-blue-500/50 focus:bg-white/10 placeholder:text-white/20"
            placeholder="superadmin" (keyup.enter)="login()">
        </div>
      </div>

      <!-- Password -->
      <div class="space-y-2">
        <label class="block text-white/60 text-sm font-bold ml-1">Password</label>
        <div class="relative group">
          <span
            class="material-icons absolute left-4 top-1/2 -translate-y-1/2 text-white/30 group-focus-within:text-blue-400 transition-colors pointer-events-none z-10">lock_outline</span>
          <input [type]="showPassword() ? 'text' : 'password'" [(ngModel)]="password" name="password"
            class="auth-input w-full h-14 pl-12 pr-12 rounded-2xl border border-white/5 bg-white/5 text-white text-[15px] transition-all outline-none focus:border-blue-500/50 focus:bg-white/10 placeholder:text-white/20"
            placeholder="••••••••" (keyup.enter)="login()">
          <button (click)="togglePasswordVisibility()"
            class="absolute right-4 top-1/2 -translate-y-1/2 text-white/30 hover:text-white/60 transition-colors focus:outline-none z-10">
            <span class="material-icons text-[20px]">{{ showPassword() ? 'visibility_off' : 'visibility' }}</span>
          </button>
        </div>
        <p class="text-[12px] text-white/40 font-medium italic mt-2 ml-1">Password must be at least 6 characters</p>
      </div>

      <!-- Messages -->
      @if (errorMessage()) {
      <div
        class="flex items-center gap-2 bg-red-500/10 border border-red-500/20 text-red-300 px-4 py-3 rounded-xl text-[13px] animate-in slide-in-from-top-2 duration-300">
        <span class="material-icons text-[18px]">error</span>
        <span>{{ errorMessage() }}</span>
      </div>
      }
      @if (successMessage()) {
      <div
        class="flex items-center gap-2 bg-green-500/10 border border-green-500/20 text-green-400 px-4 py-3 rounded-xl text-[13px] animate-in slide-in-from-top-2 duration-300">
        <span class="material-icons text-[18px]">check_circle</span>
        <span>{{ successMessage() }}</span>
      </div>
      }

      <!-- Actions -->
      <div class="space-y-4 pt-4">
        <!-- Sign In button -->
        <button (click)="login()"
          class="w-full h-14 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-2xl transition-all hover:scale-[1.01] active:scale-[0.99] shadow-lg shadow-blue-500/20 flex items-center justify-center gap-2">
          <span>Sign In</span>
        </button>

        <!-- Register Project button -->
        <button routerLink="/setup"
          class="w-full h-14 bg-slate-900/40 border border-white/5 hover:bg-slate-900/60 text-white font-bold rounded-2xl transition-all hover:scale-[1.01] active:scale-[0.99] flex items-center justify-center gap-2">
          <span>Create account</span>
        </button>
      </div>

      <!-- Forgot Password link -->
      <div class="text-center pt-4">
        <a routerLink="/forgot-password"
          class="text-sm text-blue-500/80 hover:text-blue-400 font-bold transition-colors">Forgot Password?</a>
      </div>

      <!-- Footer -->
      <div class="mt-8 text-center border-t border-white/5 pt-8">
        <a href="https://itmaskinen.se/" target="_blank" rel="noopener noreferrer"
          class="text-[10px] text-white/40 hover:text-white/60 transition-colors uppercase tracking-[0.2em] font-bold block no-underline transition-opacity">
          &copy; 2026 ITmaskinen Sverige AB. All rights reserved.
        </a>
      </div>
    </div>
  </div>
</div>
