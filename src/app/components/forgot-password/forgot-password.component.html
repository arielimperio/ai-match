<div class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
  
  <div class="p-10 w-full max-w-[420px] relative z-10 animate-in fade-in zoom-in-95 duration-700 bg-transparent border border-white/10 rounded-[32px]">
    
    <!-- Brand -->
    <div class="text-center mb-10 group">
      <div class="relative inline-block mb-6">
        <div class="absolute -inset-4 bg-indigo-500/20 blur-2xl rounded-full opacity-0 group-hover:opacity-100 transition-opacity duration-700"></div>
        <div class="absolute -inset-2 bg-white/5 backdrop-blur-md rounded-2xl border border-white/5 opacity-40"></div>
        <img src="assets/mint-logo.png" alt="Logo" class="relative h-16 w-auto mx-auto p-2 object-contain logo-img transition-all duration-500 hover:scale-110">
      </div>
      
      <div class="space-y-1">
        <h2 class="text-white text-xl font-black uppercase tracking-[0.1em]">Forgot Password</h2>
        <p class="text-white/40 text-[11px] font-medium uppercase tracking-widest mt-1">Reset your account access</p>
      </div>
    </div>

    <div class="space-y-6">
      
      <p class="text-slate-400 text-xs text-center leading-relaxed px-4">
        Enter your registered email address and we'll send you a link to reset your password.
      </p>

      <!-- Email Input -->
      <div class="space-y-2">
        <label class="block text-white text-[11px] font-bold uppercase tracking-wider ml-1">Email Address</label>
        <div class="relative">
          <input type="email" [(ngModel)]="email" name="email" 
            class="w-full h-12 px-4 rounded-xl border border-white/10 bg-black/20 text-white text-[14px] transition-all outline-none focus:border-indigo-500/50 focus:bg-black/30 placeholder:text-white/10" 
            placeholder="Enter your email">
        </div>
      </div>

      <!-- Messages -->
      @if (errorMessage()) {
        <div class="flex items-center gap-2 bg-red-500/10 border border-red-500/20 text-red-300 px-4 py-3 rounded-xl text-[13px] animate-in slide-in-from-top-2 duration-300">
          <span class="material-icons text-[18px]">error</span>
          <span>{{ errorMessage() }}</span>
        </div>
      }
      @if (successMessage()) {
        <div class="flex items-center gap-2 bg-green-500/10 border border-green-500/20 text-green-400 px-4 py-3 rounded-xl text-[13px] animate-in slide-in-from-top-2 duration-300">
          <span class="material-icons text-[18px]">check_circle</span>
          <span>{{ successMessage() }}</span>
        </div>
      }

      <!-- Submit button -->
      <button (click)="onSubmit()" [disabled]="isSubmitting() || successMessage()"
        class="w-full h-14 mt-4 bg-indigo-500 hover:bg-indigo-600 disabled:opacity-50 text-white font-bold rounded-2xl transition-all hover:scale-[1.02] active:scale-[0.98] shadow-lg shadow-indigo-500/20 flex items-center justify-center gap-2">
        @if (isSubmitting()) {
          <div class="w-5 h-5 border-2 border-white/20 border-t-white rounded-full animate-spin"></div>
        } @else {
          <span class="material-icons text-[20px]">send</span>
          <span>Send Reset Link</span>
        }
      </button>

      <!-- Back to Login -->
      <div class="mt-8 text-center border-t border-white/5 pt-8">
        <a routerLink="/login" class="text-[13px] font-medium text-indigo-400 hover:text-indigo-300 transition-colors cursor-pointer inline-flex items-center gap-2 group">
          <span class="material-icons text-[18px]">arrow_back</span>
          Back to Login
        </a>
      </div>
    </div>
  </div>
</div>
